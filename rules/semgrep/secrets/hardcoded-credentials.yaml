rules:
  - id: secrets.hardcoded-credentials
    message: Hardcoded credential detected. Use environment variables instead.
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
    metadata:
      technology:
        - secrets
      category: security
      confidence: medium
    patterns:
      - pattern-either:
          - pattern: $VAR = "..."
          - pattern: $VAR = '...'
          - pattern: const $VAR = "..."
          - pattern: const $VAR = '...'
          - pattern: let $VAR = "..."
          - pattern: let $VAR = '...'
          - pattern: var $VAR = "..."
          - pattern: var $VAR = '...'
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i).*(password|passwd|pwd|api[_-]?key|secret|token).*
