rules:
  - id: python-security.dangerous-eval-exec
    message: Dynamic content passed to eval/exec. Use ast.literal_eval() for safe parsing.
    severity: WARNING
    languages:
      - python
    metadata:
      technology:
        - python
      category: security
      confidence: high
      fix: Use ast.literal_eval() for trusted literal parsing instead of eval(). Avoid exec() for untrusted input.
    pattern-either:
      - patterns:
          - pattern: eval($X)
          - pattern-not: eval("...")
          - pattern-not: eval('...')
      - patterns:
          - pattern: exec($X)
          - pattern-not: exec("...")
          - pattern-not: exec('...')
