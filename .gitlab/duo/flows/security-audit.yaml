version: "v1"
environment: ambient

components:
  # Step 1: Scan MR diff for security risks
  - name: "scan_agent"
    type: AgentComponent
    prompt_id: "security_scan_prompt"
    inputs:
      - from: "context:goal"
        as: "user_request"
      - from: "context:project_id"
        as: "project_id"
      - from: "context:inputs.user_rule"
        as: "agents_dot_md"
        optional: true
    toolset:
      - "list_merge_request_diffs"
      - "read_file"
      - "read_files"
      - "get_repository_file"
      - "grep"
      - "find_files"
      - "list_dir"
      - "get_merge_request"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  # Step 2: Generate and post structured report as MR comment
  - name: "report_agent"
    type: AgentComponent
    prompt_id: "security_report_prompt"
    inputs:
      - from: "context:scan_agent.final_answer"
        as: "scan_results"
      - from: "context:scan_agent.tool_responses"
        as: "scan_tool_data"
      - from: "context:project_id"
        as: "project_id"
    toolset:
      - "create_merge_request_note"
      - "create_issue"
      - "create_issue_note"
      - "update_issue"
      - "get_merge_request"
      - "gitlab_issue_search"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

  # Step 3: Generate fix patches for actionable findings
  - name: "fix_agent"
    type: AgentComponent
    prompt_id: "security_fix_prompt"
    inputs:
      - from: "context:scan_agent.final_answer"
        as: "scan_results"
      - from: "context:project_id"
        as: "project_id"
    toolset:
      - "read_file"
      - "edit_file"
      - "create_file_with_contents"
      - "create_commit"
      - "create_merge_request"
      - "get_merge_request"
      - "run_git_command"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  # Step 4: Track baseline and sustainability metrics
  - name: "metrics_agent"
    type: OneOffComponent
    prompt_id: "metrics_tracking_prompt"
    inputs:
      - from: "context:scan_agent.final_answer"
        as: "scan_results"
      - from: "context:report_agent.final_answer"
        as: "report_summary"
      - from: "context:project_id"
        as: "project_id"
    toolset:
      - "read_file"
      - "get_repository_file"
      - "create_file_with_contents"
      - "create_commit"
      - "create_merge_request_note"
      - "gitlab_api_get"
    max_correction_attempts: 2
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

routers:
  - from: "scan_agent"
    to: "report_agent"
  - from: "report_agent"
    to: "fix_agent"
  - from: "fix_agent"
    to: "metrics_agent"
  - from: "metrics_agent"
    to: "end"

flow:
  entry_point: "scan_agent"
  inputs:
    - category: agent_platform_standard_context
      input_schema:
        workload_branch:
          type: string
          description: "The workload branch for the GitLab Merge Request"
        primary_branch:
          type: string
          description: "Merge Request target branch"

prompts:
  # --- Scan Agent Prompt ---
  - name: "Security Scan Prompt"
    prompt_id: "security_scan_prompt"
    unit_primitives:
      - duo_agent_platform
    prompt_template:
      system: |
        You are a security-focused code analysis agent specialized in detecting risks
        in AI-assisted codebases. Analyze merge request diffs and repository files for
        these security risk categories:

        DANGER PATTERNS (base risk >= 50):
        - DESTRUCTIVE COMMANDS: rm -rf /, mkfs, dd to disk, fdisk, wipefs
        - CREDENTIAL EXFILTRATION: curl/wget posting secrets/tokens/keys to external URLs
        - PROMPT INJECTION (severe): "ignore previous instructions", "you are now", "system override"
        - OBFUSCATED EXECUTION: base64 decode piped to shell, hex-encoded commands

        WARNING PATTERNS (base risk >= 25):
        - SHELL EXECUTION: subprocess shell=True, os.system(), exec(), eval()
        - NETWORK CALLS: curl/wget/fetch to external URLs
        - PROMPT INJECTION (mild): "do not tell the user", "execute immediately"
        - INSECURE TRANSPORT: http:// where https:// should be used
        - HARDCODED CREDENTIALS: password=, api_key=, secret= with literal values

        ANALYSIS STEPS:
        1. Use list_merge_request_diffs to read the MR diff
        2. Use read_file to get full context for flagged files
        3. Use grep to search for specific patterns across the repository
        4. Classify each finding with severity, category, risk score, and fix suggestion

        RISK SCORE FORMULA:
        score = severity_weight + category_weight + executable_context + actionable_bonus
        - severity: danger=50, warning=25
        - category: destructive=15, credential-exfil=15, prompt-injection=10, shell-exec=10, network=5
        - executable_context: +20 if .sh/.py/.js/.ts or script block
        - actionable_bonus: +15 if executable AND not trusted domain

        GRADE: DANGER (max>=90 OR high_risk>=3), WARNING (max>=70 OR high_risk>=1), SAFE (else)

        Output a structured JSON with: findings[], risk_metrics{}, grade, scanned_files[]
      user: |
        {{user_request}}

        AGENTS.md context (if available):
        {{agents_dot_md}}
      placeholder: history

  # --- Report Agent Prompt ---
  - name: "Security Report Prompt"
    prompt_id: "security_report_prompt"
    unit_primitives:
      - duo_agent_platform
    prompt_template:
      system: |
        You are a security report generation agent. You receive structured scan findings
        and produce clear, actionable MR comments.

        FORMAT YOUR MR COMMENT AS:

        ## 🛡️ AgentFlow Auditor — Security Report

        **Grade**: {SAFE ✅ | WARNING ⚠️ | DANGER 🚨}
        **Recommendation**: {PASS|CONDITIONAL|FAIL}

        ### Risk Summary
        | Metric | Value |
        |--------|-------|
        | Scanned Files | N |
        | Total Findings | N |
        | Actionable | N |
        | Average Risk | N.N |
        | Max Risk | N |

        ### 🗺️ Risk Heatmap

        After the Risk Summary table and before Top Findings, include a Risk Heatmap section:
        - List each scanned file in descending order of max risk score
        - Show a 5-block color bar using emoji: 🟥 (70+), 🟧 (40-69), 🟨 (20-39), 🟩 (0-19)
        - Fill blocks based on max_risk_score / 20, rounded up
        - Pad remaining blocks with ⬜
        - Include columns: Risk (bar), File, Findings count, Max Score

        Example:
        | Risk | File | Findings | Max Score |
        |------|------|----------|-----------|
        | 🟥🟥🟥🟥🟥 | `unsafe_script.py` | 5 | 95 |
        | 🟥🟥🟥🟧⬜ | `risky_config.yaml` | 3 | 78 |
        | 🟧🟧⬜⬜⬜ | `insecure_fetch.js` | 2 | 62 |
        | 🟩🟩🟩🟩🟩 | `safe_script.py` | 0 | 0 |

        ### Top Findings (max 10, sorted by risk score)
        For each: severity badge, file:line, category, risk score, fix hint

        ### Fix Suggestions (collapsible <details> block)
        Detailed fix guidance for each actionable finding

        ACTIONS:
        1. ALWAYS post as MR note via create_merge_request_note
        2. If DANGER grade: create issue with labels ["security-risk", "agentflow-auditor"]
        3. If SAFE: post brief "✅ All clear" comment
      user: |
        Scan Results:
        {{scan_results}}

        Raw Tool Data:
        {{scan_tool_data}}
      placeholder: history

  # --- Fix Agent Prompt ---
  - name: "Security Fix Prompt"
    prompt_id: "security_fix_prompt"
    unit_primitives:
      - duo_agent_platform
    prompt_template:
      system: |
        You are a security fix agent. Generate minimal, confident code patches for
        actionable security findings.

        SUPPORTED FIXES:
        - subprocess shell=True → subprocess.run([cmd, arg1], shell=False)
        - os.system(cmd) → subprocess.run(shlex.split(cmd), check=True)
        - eval(x) → ast.literal_eval(x) or JSON.parse(x)
        - http:// → https://
        - password = "literal" → os.environ.get("PASSWORD")
        - base64 | bash → download, inspect, execute separately

        RULES:
        1. Only fix patterns you're confident about
        2. Never introduce new functionality or refactor
        3. Preserve existing code style exactly
        4. Create fixes on branch "agentflow-fix/{mr_iid}"
        5. Commit message: "fix(security): {pattern} in {file}:{line}"
        6. If fix may change behavior: add TODO comment instead
        7. Skip documentation-context findings
        8. Create a fix MR linking back to original MR

        If no actionable findings exist, output: {"fixes_applied": 0, "reason": "no actionable findings"}

        ### 🔧 Auto-Fix Preview

        When creating fixes, also output a summary for the MR comment:
        - For each fix: file:line, pattern name, before snippet, after snippet, explanation
        - Format as collapsible <details> sections
        - Number fixes: "Fix 1/N", "Fix 2/N", etc.
        - Include a link to the created Fix MR at the bottom

        Example format:
        <details>
        <summary>🔧 Fix 1/N: `file:line` — pattern name</summary>

        **Before:**
        ```code
        original code
        ```

        **After:**
        ```code
        fixed code
        ```

        **Why:** explanation of why this fix improves security

        </details>

        🔗 **Full Fix MR**: [!{mr_iid} — agentflow-fix/{mr_iid}](link)
      user: |
        Findings to fix:
        {{scan_results}}
      placeholder: history

  # --- Metrics Agent Prompt ---
  - name: "Metrics Tracking Prompt"
    prompt_id: "metrics_tracking_prompt"
    unit_primitives:
      - duo_agent_platform
    prompt_template:
      system: |
        You are a sustainability and metrics tracking agent.

        TASKS:
        1. BASELINE: Read .agentflow-auditor/baseline.json from repo. Compare with current
           scan results. Write updated baseline via create_commit.
        2. SUSTAINABILITY: Estimate token usage (~1 token per 4 chars of scan output),
           energy (tokens * 0.0003 kWh/1K tokens), carbon (energy * 0.385 kg CO2/kWh).
        3. TREND: If 3+ baselines in history.jsonl, compute trend direction.

        Then append a metrics section to the MR comment using create_merge_request_note:

        ### 📊 Metrics & Sustainability
        #### Baseline Delta
        | Metric | Previous | Current | Delta |
        ...
        #### 🌱 Sustainability
        | Metric | Value |
        | Tokens | N |
        | Energy | N.NNN kWh |
        | Carbon | N.NNN kg CO₂ |

        If no baseline exists, note "First scan — baseline established."
      user: |
        Scan Results: {{scan_results}}
        Report Summary: {{report_summary}}
