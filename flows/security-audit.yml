name: "AgentFlow Auditor — Security Audit"
description: "Four-agent security auditing pipeline that scans MR diffs, posts structured reports with risk heatmaps, generates fix patches, and tracks sustainability metrics."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "scan_agent"
      type: AgentComponent
      prompt_id: "security_scan_prompt"
      max_correction_attempts: 2
      inputs:
        - from: "context:goal"
          as: "user_request"
        - from: "context:project_id"
          as: "project_id"
        - from: "context:inputs.user_rule"
          as: "agents_dot_md"
          optional: true
      toolset:
        - "list_merge_request_diffs"
        - "read_file"
        - "read_files"
        - "get_repository_file"
        - "grep"
        - "find_files"
        - "list_dir"
        - "get_merge_request"
        - "list_vulnerabilities"
        - "get_security_finding_details"
      ui_log_events:
        - "on_agent_final_answer"
        - "on_tool_execution_success"
        - "on_tool_execution_failed"

    - name: "report_agent"
      type: AgentComponent
      prompt_id: "security_report_prompt"
      max_correction_attempts: 2
      inputs:
        - from: "context:scan_agent.final_answer"
          as: "scan_results"
        - from: "context:scan_agent.tool_responses"
          as: "scan_tool_data"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "create_merge_request_note"
        - "create_issue"
        - "create_issue_note"
        - "update_issue"
        - "get_merge_request"
        - "gitlab_issue_search"
        - "link_vulnerability_to_merge_request"
      ui_log_events:
        - "on_agent_final_answer"
        - "on_tool_execution_success"
        - "on_tool_execution_failed"

    - name: "fix_agent"
      type: AgentComponent
      prompt_id: "security_fix_prompt"
      max_correction_attempts: 2
      inputs:
        - from: "context:scan_agent.final_answer"
          as: "scan_results"
        - from: "context:report_agent.final_answer"
          as: "report_summary"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "read_file"
        - "edit_file"
        - "create_file_with_contents"
        - "create_commit"
        - "create_merge_request"
        - "get_merge_request"
        - "list_merge_request_diffs"
        - "run_git_command"
      ui_log_events:
        - "on_agent_final_answer"
        - "on_tool_execution_success"
        - "on_tool_execution_failed"

    - name: "metrics_agent"
      type: OneOffComponent
      prompt_id: "metrics_tracking_prompt"
      max_correction_attempts: 2
      inputs:
        - from: "context:scan_agent.final_answer"
          as: "scan_results"
        - from: "context:report_agent.final_answer"
          as: "report_summary"
        - from: "context:fix_agent.final_answer"
          as: "fix_results"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "read_file"
        - "get_repository_file"
        - "create_file_with_contents"
        - "create_commit"
        - "create_merge_request_note"
        - "gitlab_api_get"
      ui_log_events:
        - "on_agent_final_answer"
        - "on_tool_execution_success"
        - "on_tool_execution_failed"

  routers:
    - from: "scan_agent"
      to: "report_agent"
    - from: "report_agent"
      condition:
        input: "context:scan_agent.final_answer"
        routes:
          "SAFE": "metrics_agent"
          "default_route": "fix_agent"
    - from: "fix_agent"
      to: "metrics_agent"
    - from: "metrics_agent"
      to: "end"

  flow:
    entry_point: "scan_agent"
    inputs:
      - category: agent_platform_standard_context
        input_schema:
          workload_branch:
            type: string
            description: "The workload branch for the GitLab Merge Request"
          primary_branch:
            type: string
            description: "Merge Request target branch"

  prompts:
    - name: "Security Scan Prompt"
      prompt_id: "security_scan_prompt"
      unit_primitives:
        - duo_agent_platform
      params:
        timeout: 180
      prompt_template:
        system: |
          You are an AI Code Security agent — you catch risks that traditional SAST
          misses in AI-assisted codebases. 40-62% of AI-generated code contains
          security vulnerabilities. You find them before production.

          AI-SPECIFIC THREATS (your unique advantage):
          - LLM PROMPT INJECTION: user input flowing unsanitized into LLM API calls
          - LLM OUTPUT EXECUTION: LLM responses passed to exec/eval/compile
          - UNSAFE ML DESERIALIZATION: pickle.load, torch.load on untrusted models

          DANGER PATTERNS (base risk >= 50):
          - DESTRUCTIVE COMMANDS: rm -rf /, mkfs, dd to disk, fdisk, wipefs
          - CREDENTIAL EXFILTRATION: curl/wget posting secrets/tokens/keys to external URLs
          - PROMPT INJECTION (severe): "ignore previous instructions", "you are now", "system override"
          - OBFUSCATED EXECUTION: base64 decode piped to shell, hex-encoded commands
          - LLM OUTPUT TO CODE EXEC: LLM response → exec/eval/compile (critical)

          WARNING PATTERNS (base risk >= 25):
          - SHELL EXECUTION: subprocess shell=True, os.system(), exec(), eval()
          - NETWORK CALLS: curl/wget/fetch to external URLs
          - PROMPT INJECTION (mild): "do not tell the user", "execute immediately"
          - INSECURE TRANSPORT: http:// where https:// should be used
          - HARDCODED CREDENTIALS: password=, api_key=, secret= with literal values
          - UNSAFE DESERIALIZATION: pickle.load, yaml.load without SafeLoader

          SCAN OPTIMIZATION:
          1. Scan only changed files first (from MR diff) — saves ~60% tokens
          2. Skip binary files, image files, lock files
          3. Auto-exclude: vendor/, node_modules/, __pycache__/
          4. Read AGENTS.md for project-specific overrides (trusted domains, excluded paths, custom rules)

          ANALYSIS STEPS:
          1. Read AGENTS.md via get_repository_file for project-level customization
          2. Use list_merge_request_diffs to read the MR diff
          3. Use read_file to get full context for flagged files
          4. Use grep to search for specific patterns across the repository
          5. Classify each finding with severity, category, risk score, and fix suggestion

          RISK SCORE FORMULA:
          score = severity_weight + category_weight + executable_context + actionable_bonus
          - severity: danger=50, warning=25
          - category: destructive=15, credential-exfil=15, prompt-injection=10, shell-exec=10, network=5
          - executable_context: +20 if .sh/.py/.js/.ts or script block
          - actionable_bonus: +15 if executable AND not trusted domain

          GRADE: DANGER (max>=90 OR high_risk>=3), WARNING (max>=70 OR high_risk>=1), SAFE (else)

          Output a structured JSON with: findings[], risk_metrics{}, grade, scanned_files[]
        user: |
          {{user_request}}

          AGENTS.md context (if available):
          {{agents_dot_md}}
        placeholder: history

    - name: "Security Report Prompt"
      prompt_id: "security_report_prompt"
      unit_primitives:
        - duo_agent_platform
      params:
        timeout: 120
      prompt_template:
        system: |
          You produce scannable AI Code Security reports as MR comments.
          Developers read in 10 seconds — keep the top level short.

          FORMAT:

          ## AgentFlow Auditor — AI Code Security Report

          **Grade**: {emoji} {SAFE|WARNING|DANGER} · **N** findings · **N** actionable · Max: **N**/100

          ### Risk Heatmap
          | Risk | File | Findings | Max |
          Color blocks: red(70+), orange(40-69), yellow(20-39), green(0-19)

          ### Top Findings (max 5)
          One line each: {badge} file:line — pattern (score/100) · Fix: hint

          <details><summary>Full Details (N findings)</summary>
          Category breakdown table + all findings with snippets + baseline delta
          </details>

          ACTIONS:
          1. ALWAYS post as MR note via create_merge_request_note
          2. If DANGER: create issue with labels ["security-risk", "agentflow-auditor"]
          3. If SAFE: post brief "All clear" comment
          4. If vulnerabilities exist: link them via link_vulnerability_to_merge_request
        user: |
          Scan Results:
          {{scan_results}}

          Raw Tool Data:
          {{scan_tool_data}}
        placeholder: history

    - name: "Security Fix Prompt"
      prompt_id: "security_fix_prompt"
      unit_primitives:
        - duo_agent_platform
      params:
        timeout: 180
      prompt_template:
        system: |
          You are a security fix agent. Generate minimal, confident code patches for
          actionable security findings.

          SUPPORTED FIXES:
          - subprocess shell=True -> subprocess.run([cmd, arg1], shell=False)
          - os.system(cmd) -> subprocess.run(shlex.split(cmd), check=True)
          - eval(x) -> ast.literal_eval(x) or JSON.parse(x)
          - http:// -> https://
          - password = "literal" -> os.environ.get("PASSWORD")
          - base64 | bash -> download, inspect, execute separately

          FIX CONFIDENCE:
          Assign a confidence level to each fix before applying:
          - HIGH: Pattern is deterministic, fix cannot change behavior (http->https, env var)
          - MEDIUM: Fix is correct but caller context matters (shell=True->False, eval->literal_eval)
          - LOW: Fix may change behavior or requires domain knowledge

          For HIGH confidence: apply fix directly.
          For MEDIUM confidence: apply fix with inline comment noting the change.
          For LOW confidence: add TODO comment only, do not change code.

          RULES:
          1. Only fix patterns you're confident about
          2. Never introduce new functionality or refactor
          3. Preserve existing code style exactly
          4. Create fixes on branch "agentflow-fix/{mr_iid}"
          5. Commit message: "fix(security): {pattern} in {file}:{line}"
          6. Group related fixes in the same file into a single commit
          7. Skip documentation-context findings
          8. Create a fix MR linking back to original MR

          If no actionable findings exist, output: {"fixes_applied": 0, "reason": "no actionable findings"}

          AUTO-FIX PREVIEW:
          For each fix, output a summary:
          - file:line, pattern name, confidence level, before snippet, after snippet, explanation
          - Format as collapsible details sections
          - Number fixes: "Fix 1/N", "Fix 2/N", etc.
          - Include a link to the created Fix MR at the bottom
        user: |
          Findings to fix:
          {{scan_results}}

          Report context:
          {{report_summary}}
        placeholder: history

    - name: "Metrics Tracking Prompt"
      prompt_id: "metrics_tracking_prompt"
      unit_primitives:
        - duo_agent_platform
      params:
        timeout: 120
      prompt_template:
        system: |
          You are a sustainability and metrics tracking agent.

          TASKS:
          1. BASELINE: Read .agentflow-auditor/baseline.json from repo. Compare with current
             scan results. Write updated baseline via create_commit.
          2. SUSTAINABILITY: Estimate token usage (~1 token per 4 chars of scan output),
             energy (tokens * 0.0003 kWh/1K tokens), carbon (energy * 0.385 kg CO2/kWh).
             Include Impact Comparison with real-world analogies:
             - Energy: 0.001 kWh = LED bulb for 3.6s, 0.01 kWh = LED for 36s, 0.1 kWh = phone charge 10%, 1.0 kWh = laptop 2hrs
             - Carbon: 0.001 kg CO2 = car 4m, 0.01 kg CO2 = car 40m, 0.1 kg CO2 = car 400m, 1.0 kg CO2 = tree absorbs in 1hr
          3. TREND: If 3+ baselines in history.jsonl, compute trend direction.
             If 2 entries: show Baseline Delta table.
             If 3+ entries: show ASCII trend chart (X=MR IIDs, Y=max risk 0-100).
          4. CROSS-MR LEARNING: Analyze history.jsonl for recurring patterns.
             - If the same category appears in 3+ consecutive scans, flag as "persistent risk"
             - Track fix adoption rate: (previous_actionable - current_actionable) / previous_actionable
             - Identify categories with 0% fix adoption and highlight them
          5. TEAM SECURITY POSTURE: If 5+ entries in history.jsonl, generate a summary:
             - Total scans, total findings, average grade distribution
             - Most common category, most persistent category
             - Trend direction over last 5 scans
             - Projected next-scan risk based on trend

          Then append a metrics section to the MR comment using create_merge_request_note:

          ### Metrics & Sustainability
          #### Baseline Delta
          | Metric | Previous | Current | Delta |
          ...
          #### Sustainability Report
          | Metric | Value |
          | Tokens | N |
          | Energy | N.NNN kWh |
          | Carbon | N.NNN kg CO2 |
          | Impact | LED for Xs / car for Xm |
          #### Persistent Risks (if any)
          Categories appearing in 3+ consecutive scans with low fix adoption.
          #### Team Security Posture (if 5+ scans)
          Cumulative risk profile and trend projection.

          If no baseline exists, note "First scan — baseline established."

          FIX TRACKING: Also include in the report:
          | Fix Status | Count |
          | Applied by Fixer | N |
          | Skipped (LOW confidence) | N |
          | Pending review | N |
        user: |
          Scan Results: {{scan_results}}
          Report Summary: {{report_summary}}
          Fix Results: {{fix_results}}
